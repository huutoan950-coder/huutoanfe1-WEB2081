<div class="max-w-6xl mx-auto mt-6 px-4">
  <h2 class="text-3xl font-bold mb-6 text-blue-700">Thêm truyện tranh</h2>

  <form [formGroup]="addForm" (ngSubmit)="submitForm()" class="mx-auto text-left">
    <div>
      <label>Tên truyện</label>
      <input type="text" formControlName="title" />
      @if (title?.invalid && title?.touched) {
        <p style="color: red">Tên truyện bắt buộc nhập và phải ít nhất 3 ký tự</p>
      }
    </div>

    <div>
      <label>Tác giả</label>
      <input type="text" formControlName="author" />
    </div>

    <div>
      <label>Lượt xem</label>
      <input type="number" formControlName="views" />
      @if (views?.invalid && views?.touched) {
        <p style="color: red">Lượt xem không được nhỏ hơn 0</p>
      }
    </div>

    <button type="submit" [disabled]="addForm.invalid">Thêm truyện</button>
  </form>

  <h3 class="mt-6 font-bold">Dữ liệu Form Realtime:</h3>
  <pre class="bg-gray-100 p-4 rounded w-96 mx-auto text-left">{{ addForm.value | json }}</pre>
</div>
