<div class="p-6 max-w-md mx-auto mt-10 bg-white rounded-xl shadow-lg border">
  <h1 class="text-2xl font-bold mb-6 text-center text-green-600">Đăng Nhập</h1>

  @if (error) {
    <div class="p-3 mb-4 bg-red-100 text-red-700 font-bold rounded text-center">{{ error }}</div>
  }

  <form [formGroup]="loginForm" (ngSubmit)="submitForm()" class="space-y-4">
    <div>
      <label class="block font-medium mb-1">Email</label>
      <input
        formControlName="email"
        type="email"
        class="w-full border rounded-lg px-3 py-2 outline-none focus:border-green-500"
      />
      @if (email?.invalid && email?.touched) {
        <p class="text-red-500 text-sm mt-1">Email không hợp lệ hoặc bị trống.</p>
      }
    </div>

    <div>
      <label class="block font-medium mb-1">Mật khẩu</label>
      <input
        formControlName="password"
        type="password"
        class="w-full border rounded-lg px-3 py-2 outline-none focus:border-green-500"
      />
      @if (password?.invalid && password?.touched) {
        <p class="text-red-500 text-sm mt-1">Mật khẩu tối thiểu 6 ký tự.</p>
      }
    </div>

    <button
      type="submit"
      [disabled]="loginForm.invalid || loading"
      class="px-5 py-3 bg-green-600 hover:bg-green-700 text-white font-bold rounded-lg w-full disabled:bg-gray-400"
    >
      {{ loading ? 'Đang xử lý...' : 'Đăng nhập ngay' }}
    </button>
  </form>
</div>
