<div class="p-6 max-w-md mx-auto mt-10 bg-white rounded-xl shadow-lg border">
  <h1 class="text-2xl font-bold mb-6 text-center text-blue-600">Đăng Nhập</h1>

  @if (success) {
    <div class="p-3 mb-4 bg-green-100 text-green-700 font-bold rounded text-center">
      {{ success }}
    </div>
  }
  @if (error) {
    <div class="p-3 mb-4 bg-red-100 text-red-700 font-bold rounded text-center">{{ error }}</div>
  }

  <form [formGroup]="loginForm" (ngSubmit)="submitForm()" class="space-y-4">
    <div>
      <label class="block font-medium mb-1">Email</label>
      <input
        formControlName="email"
        type="email"
        class="w-full border rounded-lg px-3 py-2 outline-none focus:border-blue-500"
      />
      @if (email?.invalid && email?.touched) {
        <p class="text-red-500 text-sm mt-1">Vui lòng nhập đúng định dạng email.</p>
      }
    </div>

    <div>
      <label class="block font-medium mb-1">Mật khẩu</label>
      <input
        formControlName="password"
        type="password"
        class="w-full border rounded-lg px-3 py-2 outline-none focus:border-blue-500"
      />
      @if (password?.invalid && password?.touched) {
        <p class="text-red-500 text-sm mt-1">Mật khẩu không được để trống.</p>
      }
    </div>

    <button
      type="submit"
      [disabled]="loginForm.invalid || loading"
      class="px-5 py-3 mt-4 bg-blue-600 text-white rounded-lg w-full font-bold transition-colors disabled:bg-gray-400"
    >
      {{ loading ? 'Đang kiểm tra...' : 'Đăng nhập' }}
    </button>
  </form>
</div>
