<div class="max-w-6xl mx-auto mt-6 px-4">
  <h2 class="text-3xl font-bold mb-6 text-center text-blue-700">Thêm Product</h2>

  @if (success) {
    <div
      class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4 w-96 mx-auto"
    >
      {{ success }}
    </div>
  }

  @if (error) {
    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 w-96 mx-auto">
      {{ error }}
    </div>
  }

  <form
    [formGroup]="productForm"
    (ngSubmit)="submitForm()"
    class="flex flex-col gap-4 w-96 mx-auto text-left"
  >
    <div class="flex flex-col gap-1">
      <label class="font-semibold">Tên sản phẩm</label>
      <input type="text" formControlName="name" class="border border-gray-300 p-2 rounded" />
      @if (name?.invalid && name?.touched) {
        <p class="text-red-500 text-sm">Tên sản phẩm là bắt buộc</p>
      }
    </div>

    <div class="flex flex-col gap-1">
      <label class="font-semibold">Giá</label>
      <input type="number" formControlName="price" class="border border-gray-300 p-2 rounded" />
      @if (price?.invalid && price?.touched) {
        <p class="text-red-500 text-sm">Giá phải lớn hơn 0</p>
      }
    </div>

    <div class="flex flex-col gap-1">
      <label class="font-semibold">Danh mục</label>
      <input type="text" formControlName="category" class="border border-gray-300 p-2 rounded" />
    </div>

    <button
      type="submit"
      [disabled]="productForm.invalid || loading"
      class="bg-blue-600 text-white font-bold py-2 px-4 rounded disabled:bg-gray-400 mt-2"
    >
      {{ loading ? 'Đang gửi...' : 'Thêm sản phẩm' }}
    </button>
  </form>

  <h3 class="mt-6 font-bold text-center">Dữ liệu Form Realtime:</h3>
  <pre class="bg-gray-100 p-4 rounded w-96 mx-auto text-left">{{ productForm.value | json }}</pre>
</div>
